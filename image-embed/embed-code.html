<figure
  style="
    margin: 0;
    max-width: 1024px;
    width: 100%;
    font-family: Arial, Helvetica, sans-serif;
  "
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 1024 498"
    role="img"
    aria-labelledby="numbered-slot-image-title numbered-slot-image-description"
    style="display: block; width: 100%; height: auto; background: #ffffff"
  >
    <title id="numbered-slot-image-title">Numbered horizontal slot layout</title>
    <desc id="numbered-slot-image-description">
      Eighteen thin horizontal rectangles arranged in three rows of six, numbered 1 through 18.
    </desc>

    <defs>
      <g id="numbered-slot-bar">
        <rect x="0" y="0" width="150" height="9" rx="1" fill="#ffffff" stroke="#4d4d4d" stroke-width="4" />
        <rect x="4" y="3" width="142" height="3" fill="#f7f7f7" />
      </g>
    </defs>

    <g fill="#555555" font-size="14" text-anchor="middle">
      <use href="#numbered-slot-bar" x="29" y="72" />
      <text x="104" y="102">1</text>

      <use href="#numbered-slot-bar" x="193" y="72" />
      <text x="268" y="102">2</text>

      <use href="#numbered-slot-bar" x="356" y="72" />
      <text x="431" y="102">3</text>

      <use href="#numbered-slot-bar" x="519" y="72" />
      <text x="594" y="102">4</text>

      <use href="#numbered-slot-bar" x="682" y="72" />
      <text x="757" y="102">5</text>

      <use href="#numbered-slot-bar" x="845" y="72" />
      <text x="920" y="102">6</text>

      <use href="#numbered-slot-bar" x="29" y="213" />
      <text x="104" y="243">7</text>

      <use href="#numbered-slot-bar" x="193" y="213" />
      <text x="268" y="243">8</text>

      <use href="#numbered-slot-bar" x="356" y="213" />
      <text x="431" y="243">9</text>

      <use href="#numbered-slot-bar" x="519" y="213" />
      <text x="594" y="243">10</text>

      <use href="#numbered-slot-bar" x="682" y="213" />
      <text x="757" y="243">11</text>

      <use href="#numbered-slot-bar" x="845" y="213" />
      <text x="920" y="243">12</text>

      <use href="#numbered-slot-bar" x="29" y="354" />
      <text x="104" y="384">13</text>

      <use href="#numbered-slot-bar" x="193" y="354" />
      <text x="268" y="384">14</text>

      <use href="#numbered-slot-bar" x="356" y="354" />
      <text x="431" y="384">15</text>

      <use href="#numbered-slot-bar" x="519" y="354" />
      <text x="594" y="384">16</text>

      <use href="#numbered-slot-bar" x="682" y="354" />
      <text x="757" y="384">17</text>

      <use href="#numbered-slot-bar" x="845" y="354" />
      <text x="920" y="384">18</text>
    </g>
  </svg>
</figure>
